<!--
  Semar / 天人合一 Codex - Mark v3 (Semar wayang silhouette)
  Body path: D3 CatmullRomClosed spline through 37 anatomical key points.

  Anatomy (right profile, wayang kulit reference):
    Kuncung: small forehead bump (not topknot)
    Head: round, proportionate
    Nose: flat/pug (pesek) — barely protrudes
    Belly: DOMINANT — large sphere, front AND back rounded equally
    Rear: also rounded (character is round on all sides)
    Legs: very short, stubby
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400"
